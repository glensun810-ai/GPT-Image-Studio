# ============================================================
# GPT Image Studio - Nginx 配置
# 部署于 jhw-ai.com 的 /GPT-Image-Studio/ 子路径
# ============================================================
# 将此文件上传到服务器 /etc/nginx/conf.d/jhw-ai.com.conf
# 或合并到主站 Nginx 配置中
#
# 适用环境：阿里云服务器 120.76.156.83
# ============================================================

# ---- HTTPS 配置（443 端口） ----
server {
    listen 443 ssl http2;
    server_name jhw-ai.com;

    # SSL 证书（你的已有配置）
    ssl_certificate     /www/wwwroot/jhw-ai.com/SSL/fullchain.cer;
    ssl_certificate_key /www/wwwroot/jhw-ai.com/SSL/jhw-ai.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---- GPT-Image-Studio 子路径反向代理 ----
    location /GPT-Image-Studio/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（Next.js HMR / 未来可能用到）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 请求体大小限制（图片参考 URL 可能较长）
        client_max_body_size 10m;

        # 禁用缓存（保证实时性）
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ---- 其他已有路由保持不变 ----
    # location / { ... }  # 你的主站其他页面

    # ---- 静态资源缓存（图片等） ----
    location /GPT-Image-Studio/_next/static {
        proxy_pass http://127.0.0.1:5000/_next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ---- 拒绝非 HTTPS 访问 ----
    error_page 497 =301 https://$host$request_uri;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name jhw-ai.com;
    return 301 https://$server_name$request_uri;
}
